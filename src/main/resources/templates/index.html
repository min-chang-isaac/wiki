<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Wiki</title>
</head>
<body>

<h1>Wiki</h1>

<p><a th:href="@{/pages/new}">新規ページ作成</a></p>

<ul>
    <li th:each="p : ${pages}">
        <span th:text="${p.title}"></span>
        <a th:href="@{/pages/{id}/edit(id=${p.id})}">編集</a>
        <form th:action="@{/pages/{id}/delete(id=${p.id})}" method="post" style="display:inline;">
    		<button type="submit">削除</button>
		</form>
    </li>
</ul>

</body>
</html>
