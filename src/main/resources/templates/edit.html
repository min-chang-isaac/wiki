<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ページ編集</title>
</head>
<body>

<h1>ページ編集</h1>	

<form th:action="@{/pages/{id}(id=${page.id})}" method="post">

<input type="text" name="title" th:value="${page.title}" />

<textarea name="content" th:text="${page.content}"></textarea>

<button type="submit">更新</button>

</form>

</body>
</html>
