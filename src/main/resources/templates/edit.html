<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ページ編集</title>
</head>
<body>

	<h1>ページ編集</h1>

	<form th:action="@{/pages/{id}(id=${page.id})}" th:object="${page}"
		method="post">
		<div>
			<label for="title">タイトル</label> <input type="text" id="title"
				th:field="*{title}">
		</div>

		<div>
			<label for="context">本文</label>
			<textarea id="content" th:field="*{content}" rows="10" cols="50"></textarea>
		</div>

		<div>
			<button type="submit">更新</button>
		</div>
	</form>

<p><a th:href="@{/}">一覧に戻る</a></p>\

</body>
</html>
